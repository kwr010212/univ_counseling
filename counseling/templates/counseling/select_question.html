<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ category_name }} 심층 질문 선택</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 650px; margin: 0 auto; padding: 40px 20px; background-color: #f8f9fa; color: #333; }
        .header { text-align: center; margin-bottom: 30px; }
        .badge { display: inline-block; background: #007bff; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85em; font-weight: bold; margin-bottom: 10px; }
        .title { font-size: 1.4em; font-weight: bold; color: #222; margin: 0; }
        .desc { font-size: 0.9em; color: #666; margin-top: 8px; }
        
        .container { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        
        /* 💡 질문 선택 카드 (마우스 오버 시 우림님이 다듬었던 정밀 바인딩 인터랙션 효과 적용) */
        .q-card { background: white; border: 1px solid #ddd; padding: 20px; border-radius: 8px; text-align: left; font-size: 0.95em; line-height: 1.5; color: #444; cursor: pointer; transition: all 0.2s ease; width: 100%; box-sizing: border-box; font-family: inherit; }
        .q-card:hover { border-color: #007bff; background: #f1f7ff; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,123,255,0.08); }
        
        .back-link { display: inline-block; text-decoration: none; color: #666; font-size: 0.9em; margin-bottom: 20px; }
        .back-link:hover { color: #007bff; }
    </style>
</head>
<body>

    <a href="{% url 'counseling_home' %}" class="back-link">← 대시보드로 복귀</a>

    <div class="header">
        <div class="badge">집중 분석 테마</div>
        <h1 class="title">🎯 {{ category_name }} 고민 심층 질문 리스트</h1>
        <p class="desc">우림님이 대답하기 가장 편안하거나, 현재 상황에 딱 맞는 질문을 하나 골라주세요.</p>
    </div>

    <form action="{% url 'start_topic_counseling' %}" method="POST">
        {% csrf_token %}
        <input type="hidden" name="category_name" value="{{ category_name }}">
        
        <div class="container">
            {% for q in questions %}
                <button type="submit" name="selected_question" value="{{ q }}" class="q-card">
                    📌 <strong>{{ q }}</strong>
                </button>
            {% endfor %}
        </div>
    </form>

</body>
</html>
