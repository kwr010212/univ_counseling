<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 채팅</title>
    <style>
        /* 🎨 글로벌 기본 스타일 및 세로 흐름 정렬 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Malgun Gothic"; 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #f3f4f6; 
            color: #334155; 
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 🔗 상단 나가기 버튼 */
        .back-link { 
            display: inline-flex; 
            align-items: center;
            text-decoration: none; 
            color: #64748b; 
            font-weight: 500; 
            margin-bottom: 16px; 
            font-size: 0.9em;
            transition: color 0.2s;
        }
        .back-link:hover { color: #818cf8; }
        
        /* ⏳ [1단계] 고민 매칭 스피너 박스 */
        .matching-box { 
            background: white; 
            border-radius: 16px; 
            padding: 50px 24px; 
            text-align: center; 
            border: 1px solid #e5e7eb; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03);
            margin: auto 0;
        }
        .spinner { 
            border: 3.5px solid #f3f4f6; 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            border-left-color: #818cf8; 
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
            margin: 0 auto 24px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 💬 [2단계] 실시간 채팅창 메인 박스 컨테이너 */
        .chat-container { 
            display: none; 
            background: white; 
            border-radius: 16px; 
            border: 1px solid #e5e7eb; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            overflow: hidden; 
            position: relative; 
            margin: auto 0;
        }

        /* 🔮 헤더 바 스타일 - 부드러운 파스텔 라벤더 블루 적용 */
        .chat-header { 
            background: #818cf8; 
            color: white; 
            padding: 15px 18px; 
            font-weight: 600; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: relative;
            z-index: 12;
        }
        .room-badge { 
            background: rgba(255, 255, 255, 0.22); 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.82em; 
            letter-spacing: -0.3px;
        }
        
        /* 👥 참여자 보기 토글 버튼 */
        .users-toggle-btn { 
            background: rgba(255, 255, 255, 0.18); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; 
            padding: 5px 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.82em; 
            font-weight: 500; 
            transition: all 0.2s; 
        }
        .users-toggle-btn:hover { background: rgba(255, 255, 255, 0.28); }

        /* 👥 우측 레이어 슬라이딩 참여자 사이드바 (높이 460px 구역에 맞춰 확장) */
        .user-sidebar { 
            position: absolute; 
            top: 56px; 
            right: -210px; 
            width: 190px; 
            height: 460px; 
            background: #ffffff; 
            border-left: 1px solid #e5e7eb; 
            box-shadow: -10px 0 15px -3px rgba(0, 0, 0, 0.02); 
            z-index: 10; 
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            flex-direction: column; 
        }
        .sidebar-header { 
            background: #f9fafb; 
            padding: 14px 16px; 
            font-size: 0.8em; 
            font-weight: 600; 
            color: #64748b; 
            border-bottom: 1px solid #e5e7eb; 
        }
        .user-list-feed { 
            list-style: none; 
            margin: 0; 
            padding: 12px; 
            overflow-y: auto; 
            font-size: 0.88em; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }
        .user-list-item { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            color: #475569; 
            padding: 6px 8px; 
            border-radius: 6px; 
        }
        .user-list-item.me { 
            background: #f0fdf4; 
            color: #16a34a; 
            font-weight: 600; 
        }
        .status-dot { 
            width: 7px; 
            height: 7px; 
            background-color: #4ade80; 
            border-radius: 50%; 
            display: inline-block; 
        }

        /* 📜 롱(Long) 스타일 메시지 대화 피드 - 세로 길이를 460px로 시원하게 확장 */
        .chat-messages { 
            height: 460px; 
            padding: 22px 18px; 
            overflow-y: auto; 
            background: #f9fafb; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
        }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.other { align-self: flex-start; align-items: flex-start; }
        
        .msg-meta { font-size: 0.75em; color: #94a3b8; margin-bottom: 4px; font-weight: 500; padding: 0 4px; }
        
        /* 대화 말풍선 가독성 디자인 스타일 */
        .msg-bubble { 
            padding: 10px 15px; 
            border-radius: 14px; 
            font-size: 0.92em; 
            line-height: 1.5; 
            word-break: break-all; 
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.02);
        }
        /* 내 말풍선도 파스텔 라벤더 톤으로 깔끔하게 매칭 */
        .me .msg-bubble { background: #818cf8; color: white; border-top-right-radius: 2px; }
        .other .msg-bubble { background: white; color: #334155; border-top-left-radius: 2px; border: 1px solid #e5e7eb; }
        
        .system-msg { 
            align-self: center; 
            background: #e5e7eb; 
            color: #475569; 
            font-size: 0.78em; 
            padding: 6px 16px; 
            border-radius: 20px; 
            margin: 4px 0; 
            font-weight: 500;
        }

        /* ⌨️ 하단 텍스트 입력창 구역 */
        .chat-input-form { 
            display: flex; 
            border-top: 1px solid #e5e7eb; 
            background: white; 
            position: relative; 
            z-index: 11; 
            padding: 8px;
        }
        .chat-input { 
            flex: 1; 
            padding: 12px 14px; 
            border: none; 
            font-size: 0.92em; 
            color: #334155;
            background: transparent;
        }
        .chat-input:focus { outline: none; }
        
        /* 우측 전송 버튼 파스텔 라벤더 톤다운 */
        .chat-send-btn { 
            background: #818cf8; 
            color: white; 
            border: none; 
            padding: 0 20px; 
            font-weight: 600; 
            font-size: 0.9em;
            border-radius: 10px;
            cursor: pointer; 
            transition: background 0.2s, transform 0.1s; 
        }
        .chat-send-btn:hover { background: #6366f1; }
        .chat-send-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <a href="{% url 'community_list' %}" class="back-link">← 홈으로</a>

    <div class="matching-box" id="matchingBox">
        <div class="spinner"></div>
        <h3 style="margin: 0 0 8px 0; color: #818cf8; font-weight: 700; font-size: 1.2em;">🤝 고민 메이트 매칭 중...</h3>
        <p style="font-size: 0.88em; color: #64748b; margin: 0; line-height: 1.6;">
            <strong>{{ request.user.username }}</strong>님의 최근 고민 분야인 <strong style="color: #f87171;">[{{ user_category }}]</strong> 카테고리에서<br>
            속마음을 함께 나눌 학우들을 실시간 연동하고 있습니다.
        </p>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <span class="room-badge" id="roomName">🌱 {{ user_category }} 채팅방</span>
            <button class="users-toggle-btn" id="sidebarToggleBtn">👥 참여자 (<span id="userCount">0</span>)</button>
        </div>
        
        <div class="user-sidebar" id="userSidebar">
            <div class="sidebar-header">🟢 현재 접속 중인 학우</div>
            <ul class="user-list-feed" id="userListFeed">
                </ul>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="system-msg">{{ user_category }}가 고민인 사람들의 채팅방입니다.</div>
        </div>
        
        <form class="chat-input-form" id="chatForm">
            {% csrf_token %}
            <input type="text" id="messageInput" class="chat-input" placeholder="따뜻한 위로와 이야기를 건네보세요..." autocomplete="off" required>
            <button type="submit" class="chat-send-btn">전송</button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const userCategory = "{{ user_category }}";
            const currentUsername = "{{ request.user.username }}";
            let lastMessageCount = -1;
            
            setTimeout(() => {
                document.getElementById('matchingBox').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'block';
                
                fetchChatMessages();
                fetchRoomUsers();
                
                setInterval(fetchChatMessages, 1000);
                setInterval(fetchRoomUsers, 1000);
            }, 1500);

            const chatForm = document.getElementById('chatForm');
            const messageInput = document.getElementById('messageInput');
            const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;

            chatForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const message = messageInput.value.trim();
                if (!message) return;

                fetch("{% url 'chat_api' %}?room=" + encodeURIComponent(userCategory), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken
                    },
                    body: JSON.stringify({ text: message })
                })
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success') {
                        messageInput.value = '';
                        fetchChatMessages();
                    }
                });
            });

            function fetchChatMessages() {
                fetch("{% url 'chat_api' %}?room=" + encodeURIComponent(userCategory))
                .then(res => res.json())
                .then(data => {
                    const messages = data.messages || [];
                    if (messages.length !== lastMessageCount) {
                        lastMessageCount = messages.length;
                        renderMessages(messages);
                    }
                });
            }

            function renderMessages(messages) {
                const msgFeed = document.getElementById('chatMessages');
                msgFeed.innerHTML = '<div class="system-msg">{{ user_category }}가 고민인 사람들의 채팅방입니다. 자유롭게 이야기 할수 있습니다.</div>';
                
                messages.forEach(msg => {
                    const wrapper = document.createElement('div');
                    if (msg.user === currentUsername) {
                        wrapper.className = 'msg-wrapper me';
                        wrapper.innerHTML = `
                            <div class="msg-meta">나</div>
                            <div class="msg-bubble">${msg.text}</div>
                        `;
                    } else {
                        wrapper.className = 'msg-wrapper other';
                        wrapper.innerHTML = `
                            <div class="msg-meta">익명 학우</div>
                            <div class="msg-bubble">${msg.text}</div>
                        `;
                    }
                    msgFeed.appendChild(wrapper);
                });
                msgFeed.scrollTop = msgFeed.scrollHeight;
            }

            function fetchRoomUsers() {
                fetch("{% url 'room_users_api' %}?room=" + encodeURIComponent(userCategory))
                .then(res => res.json())
                .then(data => {
                    const users = data.users || [];
                    const count = data.count !== undefined ? data.count : users.length;
                    
                    document.getElementById('userCount').innerText = count;
                    
                    const listFeed = document.getElementById('userListFeed');
                    listFeed.innerHTML = '';
                    
                    let anonymousIndex = 1;
                    users.forEach(user => {
                        const li = document.createElement('li');
                        if (user === currentUsername) {
                            li.className = 'user-list-item me';
                            li.innerHTML = `<span class="status-dot"></span>나 (익명 학우)`;
                        } else {
                            li.className = 'user-list-item';
                            li.innerHTML = `<span class="status-dot"></span>익명 학우 ${anonymousIndex}`;
                            anonymousIndex++;
                        }
                        listFeed.appendChild(li);
                    });
                })
                .catch(err => console.error("참여자 데이터 동기화 에러:", err));
            }

            const sidebar = document.getElementById('userSidebar');
            const toggleBtn = document.getElementById('sidebarToggleBtn');
            if (toggleBtn && sidebar) {
                toggleBtn.addEventListener('click', function() {
                    if (sidebar.style.right === '0px') {
                        sidebar.style.right = '-210px';
                    } else {
                        sidebar.style.right = '0px';
                    }
                });
            }
        });
    </script>
</body>
</html>
