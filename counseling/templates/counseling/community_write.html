<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>univ counseling - 새로운 고민 털어놓기</title>
    <style>
        /* 🎨 [글로벌 기본 스타일] 포근하고 차분한 파스텔 톤 가이드 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Malgun Gothic"; 
            max-width: 650px; 
            margin: 0 auto; 
            padding: 24px 20px; 
            background-color: #f0f2f5; 
            color: #334155; 
            line-height: 1.6;
        }

        /* 🏠 [상단 내비게이션 바] 커뮤니티 목록 복귀 링크 */
        .back-link-box { margin-bottom: 16px; }
        .back-link { 
            font-size: 0.9em; 
            color: #64748b; 
            text-decoration: none; 
            font-weight: 600; 
            transition: color 0.2s; 
        }
        .back-link:hover { color: #4f46e5; }
        
        /* 📝 [메인 글쓰기 폼 박스] 라운딩 처리된 컴팩트 화이트 카드 디자인 */
        .form-box { 
            background: white; 
            border-radius: 16px; 
            padding: 28px; 
            border: 1px solid #e5e7eb; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); 
        }
        
        /* 개별 입력 항목 그룹 간격 서식 */
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-weight: 600; font-size: 0.92em; color: #475569; }
        
        /* ✍️ [공통 입력창 컨트롤러 서식] 인풋, 셀렉트, 텍스트에어리어 공통 스타일 */
        .form-control { 
            width: 100%; 
            padding: 12px 14px; 
            border: 1px solid #e5e7eb; 
            border-radius: 10px; 
            font-size: 0.95em; 
            color: #334155;
            background-color: #ffffff;
            box-sizing: border-box; 
            transition: all 0.2s;
        }
        /* 입력 폼 포커스 시 부드러운 라벤더 블루 아웃라인 효과 */
        .form-control:focus { 
            border-color: #818cf8; 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
        }
        
        /* 텍스트에어리어 크기 조절 고정 장치 */
        textarea.form-control { resize: none; }
        
        /* 🚀 [고민 등록 버튼] 와이드 액션 버튼 스타일 */
        .submit-btn { 
            width: 100%; 
            background: #818cf8; 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-size: 0.95em; 
            font-weight: 600; 
            cursor: pointer; 
            box-shadow: 0 4px 6px -1px rgba(129, 140, 248, 0.2);
            transition: all 0.2s;
        }
        .submit-btn:hover { background: #6366f1; }
        .submit-btn:active { transform: scale(0.99); }
    </style>
</head>
<body>

    <div class="back-link-box">
        <a href="{% url 'community_list' %}" class="back-link">← 고민 목록으로 돌아가기</a>
    </div>

    <div class="form-box">
        <h3 style="margin-top: 0; margin-bottom: 24px; color: #4f46e5; font-weight: 700; font-size: 1.2em;">✏️ 새로운 고민 털어놓기</h3>
        
        <form method="POST" action="{% url 'community_write' %}">
            {% csrf_token %}
            
            <div class="input-group">
                <label for="category">고민 카테고리</label>
                <select id="category" name="category" class="form-control" required>
                    {% for cat in categories %}
                        <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="input-group">
                <label for="title">제목</label>
                <input type="text" id="title" name="title" class="form-control" placeholder="어떤 고민이 있으신가요?" required>
            </div>
            
            <div class="input-group">
                <label for="content">내용</label>
                <textarea id="content" name="content" class="form-control" rows="8" placeholder="다른 학우들과 나누고 싶은 이야기를 솔직하게 적어보세요." required></textarea>
            </div>
            
            <button type="submit" class="submit-btn">고민 등록하기 🚀</button>
        </form>
    </div>

</body>
</html>
